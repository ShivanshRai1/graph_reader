[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"

[functions."ai-relay"]
  timeout = 26

# DigitalOcean Graph Capture API (primary). Same-origin HTTPS proxy avoids
# mixed-content blocks from https://graph-capture.netlify.app → http://DO.
[[redirects]]
  from = "/do-api/*"
  to = "http://165.22.212.92:8010/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/do-api"
  to = "http://165.22.212.92:8010/"
  status = 200
  force = true
